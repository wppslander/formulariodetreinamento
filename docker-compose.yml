version: '3.8'

services:
  web:
    build: .
    ports:
      - "8081:80"
    environment:
      - TZ=America/Sao_Paulo
    env_file:
      - .env
    restart: always
    volumes:
      - ./public:/var/www/html/public # Hot-reload do código
      - ./reports:/var/www/html/reports # Persistência dos logs
